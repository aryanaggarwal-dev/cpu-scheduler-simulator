version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: flowcpu-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cpu-scheduler

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: flowcpu-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/cpu-scheduler
      CLIENT_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: flowcpu-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    environment:
      REACT_APP_API_URL: http://localhost:5000/api

volumes:
  mongo_data:
